services:
  app:
    build: .
    ports:
      - "2023:2023"
    environment:
      DATABASE_URL: postgresql://mdconvert:${DB_PASSWORD}@db:5432/mdconvert
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:2023}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mdconvert
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mdconvert
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdconvert"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mock-service:
    build: ./mock-service
    ports:
      - "3099:3099"
    environment:
      MOCK_PORT: 3099
      MOCK_API_KEY: DUMMY_SECRET_KEY
      MOCK_DELAY_MS: 300

    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  outputs:

